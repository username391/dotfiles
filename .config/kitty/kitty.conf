#background_opacity 0.9
include ~/.cache/ags/user/generated/kitty-colors.conf
# Shell
shell zsh

# font_family Geist Mono
# bold_font Geist Mono Bold
# italic_font Geist Mono Italic
# bold_italic_font Geist Mono Bold Italic

# font_family      JetBrains Mono Bold
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_family           FantasqueSansM Nerd Font Mono
italic_font           FantasqueSansM Nerd Font Mono
bold_font             FantasqueSansM Nerd Font Mono
bold_italic_font      FantasqueSansM Nerd Font Mono
font_size        20

# Additional font-related settings
#font_size 13.0


# Behaviour
window_padding_width 5
cursor_trail 1
background_opacity 0.8
hide_window_decorations no
confirm_os_window_close 0
allow_remote_control yes

