# scripts
$lock_script             = $HOME/.config/hypr/scripts/hyprlock.sh
$random_wallpaper_script = $HOME/.config/hypr/scripts/random-wallpaper.sh ~/__wallpapers/
$take_screenshot_script  = $HOME/.config/scripts/take-screenshot.sh
$show_volume_script      = $HOME/.config/scripts/show-volume.sh

# programs
$terminal      = kitty
$fileManager   = nautilus
$menu = pkill rofi || rofi -show drun -modi drun,filebrowser,run,window -icon-theme Papirus
$logoutManager = wlogout

source = $HOME/.config/hypr/conf/colors.conf
source = $HOME/.config/hypr/conf/misc.conf
source = $HOME/.config/hypr/conf/layouts.conf
source = $HOME/.config/hypr/conf/general.conf
source = $HOME/.config/hypr/conf/binds.conf
source = $HOME/.config/hypr/conf/input.conf
source = $HOME/.config/hypr/conf/decorations/default.conf
# Copied from hyprluna, if not nvidia should be default.conf
source = $HOME/.config/hypr/conf/env/nvidia.conf
source = $HOME/.config/hypr/conf/autostart.conf
source = $HOME/.config/hypr/conf/monitor.conf
source = $HOME/.config/hypr/conf/windowrules.conf

source = $HOME/.config/hypr/conf/animations.conf
source = $HOME/.config/hypr/conf/gestures.conf
source = $HOME/.config/hypr/conf/master.conf
source = $HOME/.config/hypr/conf/device.conf


xwayland {
	# fix pixelated fonts in some apps
	force_zero_scaling = true
}


