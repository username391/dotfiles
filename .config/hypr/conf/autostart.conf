exec-once = ~/.config/waybar/launch-waybar.sh
# exec-once = ~/.config/hyprpanel/launch-hyprpanel.sh
# exec-once = eww daemon &
# exec-once = dunst
exec-once = hyprpaper &
exec-once = keepassxc
exec-once = udiskie
exec-once = hypridle

# NOTE: I disabled it because hyprpanel starts it by itself
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec = hyprshade on blue-light-filter
exec = ~/.config/scripts/hypr/hyprshade.py --restore
exec = ~/.config/scripts/check-btc-seeds.py 5

exec = ~/.config/scripts/hypr/set-wallpaper.sh --load

# These ones from hyprluna


# NOTE: This is wallpaper daemon, but i use hyprpaper, so
# i probably do not need it. Maybe i will try swww later
# exec-once = swww-daemon --format xrgb 

# this is terminal, i dont use it
# exec-once = foot --server 

exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --all
exec-once = hyprpm reload
# Cursor
# exec-once = hyprctl setcursor Bibata-Modern-Ice 24
exec = hyprctl setcursor Bibata-Modern-DarkRed 20
# Force Geist in Hyprland
exec-once = gsettings set org.gnome.desktop.interface font-name 'Geist'
exec-once = gsettings set org.gnome.desktop.interface document-font-name 'Geist'
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name 'Geist Mono'
exec-once = gsettings set org.gnome.desktop.wm.preferences titlebar-font 'Geist'
# set dark theme
# NOTE: i will do it via ng look or something
# exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'

# Audio
exec-once = easyeffects --gapplication-service
# Clipboard: history
# exec-once = wl-paste --watch cliphist store &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

